# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

build:
  dockerBuildPath: browserbase
startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - browserbaseApiKey
      - browserbaseProjectId
    properties:
      browserbaseApiKey:
        type: string
        description: API key for Browserbase
      browserbaseProjectId:
        type: string
        description: Project ID for Browserbase
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { BROWSERBASE_API_KEY: config.browserbaseApiKey, BROWSERBASE_PROJECT_ID: config.browserbaseProjectId } })
  exampleConfig:
    browserbaseApiKey: dummy-api-key-123
    browserbaseProjectId: dummy-project-id-456
